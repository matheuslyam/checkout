<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strato-Buddy Concept</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 
         * STRATO-BUDDY CSS DRAWING 
         */
        .strato-buddy {
            position: relative;
            width: 300px;
            height: 400px;
            /* Breathe animation */
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }

        /* --- LIMBS --- */
        .limb {
            position: absolute;
            background: linear-gradient(135deg, #005f99 0%, #00aaff 100%);
            border-radius: 50px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        .arm {
            width: 40px;
            height: 80px;
            top: 100px;
            transform-origin: top center;
        }

        .arm.left {
            left: -20px;
            transform: rotate(20deg);
            animation: swingLeft 2s ease-in-out infinite alternate;
        }

        .arm.right {
            right: -20px;
            transform: rotate(-20deg);
            animation: swingRight 2s ease-in-out infinite alternate;
        }

        .leg {
            width: 50px;
            height: 80px;
            bottom: -30px;
            z-index: -1;
        }

        .leg.left {
            left: 50px;
            transform: rotate(10deg);
        }

        .leg.right {
            right: 50px;
            transform: rotate(-10deg);
        }

        .paw {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 0 0 50px 50px;
        }

        .boot {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: #222;
            border-radius: 10px 10px 50px 50px;
            border-top: 2px solid #555;
        }

        @keyframes swingLeft {
            from {
                transform: rotate(10deg);
            }

            to {
                transform: rotate(30deg);
            }
        }

        @keyframes swingRight {
            from {
                transform: rotate(-10deg);
            }

            to {
                transform: rotate(-30deg);
            }
        }

        /* --- BODY (Guitar Shape) --- */
        .body-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Double Horn Shape (simplified with CSS tricks) */
        .body-shape {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 80%;
            background: radial-gradient(circle at 30% 30%, #4da6ff 0%, #0066cc 60%, #003366 100%);
            border-radius: 40% 40% 50% 50%;
            box-shadow:
                0 0 50px rgba(0, 100, 255, 0.4),
                inset 0 0 40px rgba(0, 0, 0, 0.2);
            /* Fur depth */
        }

        /* The "Horns" (Ears) */
        .ear {
            position: absolute;
            top: -20px;
            width: 60px;
            height: 100px;
            background: inherit;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }

        .ear.left {
            left: 20px;
            transform: rotate(-20deg);
        }

        .ear.right {
            right: 20px;
            transform: rotate(20deg);
            height: 80px;
        }

        /* Fur Texture Overlay */
        .fur-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="1" height="1" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.3;
            pointer-events: none;
            border-radius: inherit;
        }

        /* --- FACE --- */
        .face {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .eyes {
            display: flex;
            gap: 40px;
        }

        .eye {
            width: 50px;
            height: 70px;
            background: black;
            border-radius: 50%;
            position: relative;
            animation: blink 4s infinite;
        }

        .highlight {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }

        .highlight-small {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
        }

        @keyframes blink {

            0%,
            48%,
            52%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(0.1);
            }
        }

        .snout {
            margin-top: 10px;
            width: 20px;
            height: 15px;
            background: #ff99cc;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* --- GUITAR DETAILS --- */
        .bridge {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 15px;
            background: #333;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .strings {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            opacity: 0.4;
        }

        .string {
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
        }

        /* Interactive Message */
        .message {
            position: absolute;
            top: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="message">Visualização do Conceito "Strato-Buddy" (HTML Puro)</div>

    <div class="strato-buddy">
        <!-- Limbs -->
        <div class="limb arm left">
            <div class="paw"></div>
        </div>
        <div class="limb arm right">
            <div class="paw"></div>
        </div>
        <div class="limb leg left">
            <div class="boot"></div>
        </div>
        <div class="limb leg right">
            <div class="boot"></div>
        </div>

        <!-- Body -->
        <div class="body-container">
            <div class="body-shape">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <!-- Texture Overlay -->
                <div class="fur-texture"></div>
            </div>

            <!-- Face -->
            <div class="face">
                <div class="eyes">
                    <div class="eye">
                        <div class="highlight"></div>
                        <div class="highlight-small"></div>
                    </div>
                    <div class="eye">
                        <div class="highlight"></div>
                        <div class="highlight-small"></div>
                    </div>
                </div>
                <div class="snout"></div>
            </div>

            <!-- Guitar Details -->
            <div class="strings">
                <div class="string"></div>
                <div class="string"></div>
                <div class="string"></div>
                <div class="string"></div>
                <div class="string"></div>
                <div class="string"></div>
            </div>
            <div class="bridge"></div>
        </div>
    </div>
</body>

</html>
